<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head th:replace="~{fragments/head :: head('Корзина - Rukonpin Store')}">
</head>
<body>
<div class="main-container">
    <div class="rectangle cart-page-layout">
        <div th:replace="~{fragments/header :: header}"></div>

        <section class="cart-section">
            <div class="cart-title-row">
                <h1 class="cart-title">Корзина
                    <span class="cart-count"
                          th:if="${cart != null and cart.items != null and !cart.items.empty}"
                          th:text="${cart.items.size() + ' шт'}">
                    </span>
                </h1>
                <button class="clear-cart-btn"
                        th:if="${cart != null and cart.items != null and !cart.items.empty}"
                        onclick="handleClearCart()">
                    Удалить всё
                </button>
            </div>

            <div class="divider-line"></div>

            <div th:if="${cart != null and cart.items != null and !cart.items.empty}"
                 class="cart-content">

                <div class="cart-items-list">
                    <div th:each="item : ${cart.items}" class="cart-item">
                        <div class="cart-item-image-wrapper">
                            <img class="cart-item-image"
                                 th:src="@{${item.imageUrl}}"
                                 th:alt="${item.productName}">
                        </div>

                        <div class="cart-item-info">
                            <span class="cart-item-name" th:text="${item.productName}">Название товара</span>

                            <div class="cart-item-controls">
                                <button class="qty-btn qty-minus"
                                        th:data-item-uuid="${item.uuid}"
                                        th:data-quantity="${item.quantity - 1}"
                                        th:disabled="${item.quantity <= 1}"
                                        onclick="handleUpdateQuantity(this)">
                                    <div class="qty-minus-icon"></div>
                                </button>
                                <span class="qty-value" th:text="${item.quantity + ' шт'}">1 шт</span>
                                <button class="qty-btn qty-plus"
                                        th:data-item-uuid="${item.uuid}"
                                        th:data-quantity="${item.quantity + 1}"
                                        onclick="handleUpdateQuantity(this)">
                                    <div class="qty-plus-icon"></div>
                                </button>
                                <button class="qty-btn qty-delete"
                                        th:data-item-uuid="${item.uuid}"
                                        onclick="handleRemoveItem(this)">

                                </button>
                            </div>
                        </div>

                        <span class="cart-item-price"
                              th:text="${#numbers.formatDecimal(item.totalPrice, 0, 'WHITESPACE', 0, 'POINT') + ' ₽'}">
                            0 ₽
                        </span>
                    </div>

                    <a href="/products" class="return-to-shopping">Вернуться к покупкам</a>
                </div>

                <div class="cart-summary">
                    <span class="cart-summary-title">Стоимость заказа</span>
                    <div class="cart-summary-delivery-row">
                        <span class="cart-summary-delivery-label">Доставка</span>
                        <span class="cart-summary-delivery-value">Бесплатно</span>
                    </div>
                    <button class="checkout-btn" onclick="handleCheckout()">
                        <span>Перейти к оплате</span>
                        <span class="checkout-total"
                              th:text="${#numbers.formatDecimal(cart.totalCartPrice, 0, 'WHITESPACE', 0, 'POINT') + ' ₽'}">
                            0 ₽
                        </span>
                    </button>
                </div>
            </div>

            <div th:if="${cart == null or cart.items == null or cart.items.empty}"
                 class="cart-empty">
                <svg class="cart-empty-icon" width="80" height="100" viewBox="0 0 80 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="10" y="4" width="60" height="92" rx="10" stroke="#c8d0d6" stroke-width="3" fill="none"/>
                    <rect x="31" y="10" width="18" height="5" rx="3" stroke="#c8d0d6" stroke-width="2.5"
                          fill="#c8d0d6"/>
                    <circle cx="28" cy="40" r="4" fill="#c8d0d6"/>
                    <circle cx="52" cy="40" r="4" fill="#c8d0d6"/>
                    <path d="M28 60 Q40 52 52 60" stroke="#c8d0d6" stroke-width="2.5" stroke-linecap="round" fill="none"/>
                </svg>
                <span class="cart-empty-title">Ваша корзина пуста</span>
                <span class="cart-empty-subtitle">Самое время добавить в неё что-нибудь</span>
                <a href="/products" class="cart-empty-btn">Перейти в каталог</a>
            </div>
        </section>

        <div class="cart-page-spacer"></div>

        <section class="catalog-section">
            <div class="divider-line"></div>
            <div th:replace="~{fragments/footer :: footer}"></div>
        </section>
    </div>
</div>

</body>
</html>
